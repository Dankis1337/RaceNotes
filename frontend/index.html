<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>RaceNotes</title>
    <meta name="description" content="RaceNotes — cyclist's race diary. Track your races, setups, tire pressure and results." />

    <!-- Critical inline CSS for fast first paint -->
    <style>
      body{font-family:'Inter',system-ui,-apple-system,sans-serif;margin:0;background:#fff;color:#2D2D2D}
      #app{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center}
    </style>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#3D7A3C" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="RaceNotes" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
