version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: racenotes
      POSTGRES_PASSWORD: racenotes
      POSTGRES_DB: racenotes
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U racenotes"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata_dev:
